<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时空预测与风险预警系统</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b1120',
                        panelBg: '#111827',
                        primary: '#06b6d4', 
                        secondary: '#8b5cf6', 
                        danger: '#ef4444', 
                        textMain: '#f8fafc',
                        textMuted: '#94a3b8',
                        borderBorder: '#334155'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

    <!-- html2canvas for screenshot export -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- No external map dependency needed -->


    <style>
        body { background-color: #0b1120; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); border-radius: 0.75rem; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(51, 65, 85, 0.8); border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 1); }
        
        @keyframes playPulse {
            0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }
        .animate-play-pulse { animation: playPulse 2s infinite; }
        /* 时间进度条 */
        .time-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; background: linear-gradient(to right, #06b6d4 var(--pct,0%), #1e293b var(--pct,0%)); outline: none; cursor: pointer; }
        .time-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #06b6d4; box-shadow: 0 0 8px rgba(6,182,212,0.8); cursor: pointer; }
        /* 键盘提示 */
        .kbd-hint { display:inline-block; background:rgba(51,65,85,0.6); border:1px solid rgba(71,85,105,0.8); border-radius:4px; padding:1px 5px; font-size:10px; font-family:monospace; color:#94a3b8; }
        /* 截图按钮动效 */
        @keyframes snapFlash { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .snap-flash { animation: snapFlash 0.4s ease; }

    </style>
</head>
<body class="min-h-screen text-textMain custom-scrollbar p-4 flex flex-col gap-4">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. 数据配置与获取逻辑 
        // ==========================================
        const METRICS_DATA = {
            nyc: {
                mainMetricName: "AUC-PR", mainMetricValue: "0.6955", f1: "0.6443", recall: "0.8265",
                models: {
                    categories: ['GSNet', 'LSTM', 'CatBoost', 'Sniper', 'Myplan(Ours)'],
                    aucPr: [0.5890, 0.5899, 0.6134, 0.6240, 0.6955],
                    f1: [0.6128, 0.6155, 0.6109, 0.6262, 0.6443],
                    recall: [0.7485, 0.7914, 0.7542, 0.7004, 0.8265]
                },
                ablation: {
                    categories: ['不加自适应及后处理', '不加自适应', '不加后处理', 'Myplan(完整)'],
                    aucPr: [0.6252, 0.6601, 0.6672, 0.6955],
                    f1: [0.6087, 0.6228, 0.6348, 0.6443],
                    recall: [0.7108, 0.8046, 0.7407, 0.8265]
                }
            },
            chicago: {
                mainMetricName: "AUC-PR", mainMetricValue: "0.5617", f1: "0.4730", recall: "0.7055",
                models: {
                    categories: ['GSNet', 'LSTM', 'CatBoost', 'Sniper', 'Myplan(Ours)'],
                    aucPr: [0.4662, 0.4046, 0.4605, 0.4704, 0.5617],
                    f1: [0.3872, 0.3782, 0.3971, 0.4137, 0.4730],
                    recall: [0.4351, 0.4223, 0.4480, 0.2694, 0.7055]
                },
                ablation: {
                    categories: ['不加自适应及后处理', '不加自适应', '不加后处理', 'Myplan(完整)'],
                    aucPr: [0.4725, 0.5176, 0.5136, 0.5617],
                    f1: [0.4137, 0.4433, 0.4465, 0.4730],
                    recall: [0.6318, 0.6693, 0.6401, 0.7055]
                }
            }
        };

        const fetchExperimentData = async () => {
            try {
                const response = await fetch("results/frontend_real_data.json");
                if (!response.ok) throw new Error("JSON数据读取失败");
                const rawData = await response.json();
                return { isDemo: false, raw: rawData, timeCount: 13 };
            } catch (err) {
                console.warn("未能读取真实数据:", err.message);
                return {
                    isDemo: true,
                    raw: {
                        nyc: { grid: Array.from({length: 100}, (_, i) => ({ id: i, x: i%10, y: Math.floor(i/10), flowSeries: Array(13).fill(0).map(()=>Math.random()*2-1), labelSeries: Array(13).fill(0).map(()=>Math.random()>0.9?1:0)})) },
                        chicago: { grid: Array.from({length: 100}, (_, i) => ({ id: i, x: i%10, y: Math.floor(i/10), flowSeries: Array(13).fill(0).map(()=>Math.random()*2-1), labelSeries: Array(13).fill(0).map(()=>Math.random()>0.9?1:0)})) }
                    },
                    timeCount: 13
                };
            }
        };

        const sigmoid = (x) => 1 / (1 + Math.exp(-x));

        // 经纬度映射函数
        const mapGridToGeo = (dataset, x, y) => {
            if (dataset === 'nyc') {
                const lng = -74.08 + x * 0.015;
                const lat = 40.80 - y * 0.015;
                return [lng, lat];
            } else {
                const lng = -87.70 + x * 0.015;
                const lat = 41.95 - y * 0.015;
                return [lng, lat];
            }
        };

        // ==========================================
        // 2. 通用 ECharts 渲染组件
        // ==========================================
        const { useEffect, useRef, useState, useMemo, useCallback, memo } = React;

        const ReactECharts = memo(({ option, style, className, onClick, onClickRef }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const optionRef = useRef(option);
            const onClickRefLocal = useRef(onClick);

            // 始终保持最新的 option 和 onClick
            useEffect(() => { optionRef.current = option; }, [option]);
            useEffect(() => { onClickRefLocal.current = onClick; }, [onClick]);

            // 初始化一次，用 ResizeObserver 监听尺寸
            useEffect(() => {
                const container = chartRef.current;
                if (!container) return;

                const applyOption = () => {
                    if (chartInstance.current && optionRef.current) {
                        chartInstance.current.setOption(optionRef.current, { notMerge: true, lazyUpdate: false });
                        if (onClickRefLocal.current) {
                            chartInstance.current.off('click');
                            chartInstance.current.on('click', onClickRefLocal.current);
                        }
                    }
                };

                const tryInit = () => {
                    if (!chartInstance.current && container.clientWidth > 0 && container.clientHeight > 0) {
                        chartInstance.current = echarts.init(container, 'dark', { background: 'transparent' });
                        applyOption();
                    }
                };

                const ro = new ResizeObserver(() => {
                    tryInit();
                    if (chartInstance.current) chartInstance.current.resize();
                });
                ro.observe(container);
                tryInit();

                return () => {
                    ro.disconnect();
                    if (chartInstance.current) { chartInstance.current.dispose(); chartInstance.current = null; }
                };
            }, []);

            // option 或 onClick 变化时更新图表
            useEffect(() => {
                if (!chartInstance.current) return;
                chartInstance.current.setOption(option, { notMerge: true, lazyUpdate: false });
                if (onClick) { chartInstance.current.off('click'); chartInstance.current.on('click', onClick); }
            }, [option, onClick]);

            return <div ref={chartRef} style={style || {}} className={className || ''} />;
        });

        // ==========================================
        // 3. 业务图表组件
        // ==========================================
        const MetricCard = ({ title, value, subtext, isDanger }) => (
            <div className={`glass-panel p-4 flex flex-col justify-center ${isDanger ? 'border-danger/50 shadow-[0_0_15px_rgba(239,68,68,0.2)]' : ''} transition-all duration-300`}>
                <div className="text-textMuted text-sm font-medium mb-1">{title}</div>
                <div className={`text-3xl font-bold ${isDanger ? 'text-danger' : 'text-primary'} transition-all duration-300`}>{value}</div>
                {subtext && <div className="text-xs text-textMuted mt-2">{subtext}</div>}
            </div>
        );

        // ============ SVG 热力图渲染器（最可靠方案）============
        const SVGHeatmap = memo(({ gridRaw, currentTime, onAreaClick, threshold, showTPFP }) => {
            const [tooltip, setTooltip] = useState(null);

            const bounds = useMemo(() => {
                if (!gridRaw || !gridRaw.length) return { xMin:0, xMax:9, yMin:0, yMax:9 };
                const xs = gridRaw.map(g => g.x), ys = gridRaw.map(g => g.y);
                return { xMin:Math.min(...xs), xMax:Math.max(...xs), yMin:Math.min(...ys), yMax:Math.max(...ys) };
            }, [gridRaw]);

            const W = 800, H = 400;
            const PAD = { t:10, r:20, b:30, l:40 };
            const plotW = W - PAD.l - PAD.r, plotH = H - PAD.t - PAD.b;
            const { xMin, xMax, yMin, yMax } = bounds;
            const cols = xMax - xMin + 1, rows = yMax - yMin + 1;
            const cellW = plotW / cols, cellH = plotH / rows;

            const riskToColor = useCallback((v) => {
                const stops = [
                    [0,    '#052e16'],
                    [0.25, '#16a34a'],
                    [0.45, '#84cc16'],
                    [0.55, '#eab308'],
                    [0.7,  '#f97316'],
                    [0.85, '#dc2626'],
                    [1.0,  '#7f1d1d'],
                ];
                let lo=stops[0], hi=stops[stops.length-1];
                for(let i=0;i<stops.length-1;i++){if(v>=stops[i][0]&&v<=stops[i+1][0]){lo=stops[i];hi=stops[i+1];break;}}
                const parse = c => [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
                const [lr,lg,lb]=parse(lo[1]), [hr,hg,hb]=parse(hi[1]);
                const t=lo[0]===hi[0]?0:(v-lo[0])/(hi[0]-lo[0]);
                return `rgb(${Math.round(lr+(hr-lr)*t)},${Math.round(lg+(hg-lg)*t)},${Math.round(lb+(hb-lb)*t)})`;
            }, []);

            const cells = useMemo(() => {
                if (!gridRaw) return [];
                return gridRaw.map(g => {
                    const risk = sigmoid(g.flowSeries[currentTime]);
                    const pred = risk >= (threshold||0.5) ? 1 : 0;
                    const label = g.labelSeries[currentTime] === 1 ? 1 : 0;
                    const tpfp = pred===1&&label===1?'TP': pred===1&&label===0?'FP': pred===0&&label===1?'FN':'TN';
                    const cx = PAD.l + (g.x - xMin) * cellW;
                    const cy = PAD.t + (rows - 1 - (g.y - yMin)) * cellH;
                    return { x: g.x, y: g.y, risk, cx, cy, isHit: label===1, tpfp, flowSeries: g.flowSeries, labelSeries: g.labelSeries };
                });
            }, [gridRaw, currentTime, bounds, cellW, cellH, threshold]);

            const handleCellClick = useCallback((cell) => { onAreaClick(cell.x, cell.y); }, [onAreaClick]);
            const handleMouseEnter = useCallback((cell, e) => {
                setTooltip({ x: cell.x, y: cell.y, risk: (cell.risk*100).toFixed(1), isHit: cell.isHit, tpfp: cell.tpfp, px: e.clientX, py: e.clientY });
            }, []);
            const handleMouseMove = useCallback((e) => {
                setTooltip(t => t ? {...t, px: e.clientX, py: e.clientY} : null);
            }, []);

            return (
                <div style={{position:'relative', width:'100%', marginTop:'0.5rem'}}>
                    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', display:'block', borderRadius:'0.75rem', border:'1px solid rgba(51,65,85,0.5)', background:'#0d1526'}}
                        onMouseLeave={() => setTooltip(null)}>
                        {/* 格子 + TP/FP/FN 标注 */}
                        {cells.map((c, i) => {
                            const borderColor = showTPFP
                                ? c.tpfp==='TP'?'rgba(34,197,94,0.9)':c.tpfp==='FP'?'rgba(234,179,8,0.9)':c.tpfp==='FN'?'rgba(239,68,68,0.9)':'rgba(51,65,85,0.15)'
                                : c.risk>0.7?'rgba(239,68,68,0.7)':'rgba(51,65,85,0.3)';
                            const borderW = showTPFP ? (c.tpfp==='TN'?0.3:2) : (c.risk>0.7?1.5:0.5);
                            const icon = showTPFP ? (c.tpfp==='TP'?'✓':c.tpfp==='FP'?'!':c.tpfp==='FN'?'✗':null) : null;
                            return (
                                <g key={i}>
                                    <rect
                                        x={c.cx+1} y={c.cy+1} width={cellW-2} height={cellH-2}
                                        fill={riskToColor(c.risk)} fillOpacity={0.9}
                                        stroke={borderColor} strokeWidth={borderW}
                                        style={{cursor:'pointer',transition:'fill 0.4s ease'}}
                                        onClick={() => handleCellClick(c)}
                                        onMouseEnter={(e) => handleMouseEnter(c, e)}
                                        onMouseMove={handleMouseMove}
                                    />
                                    {icon && <text x={c.cx+cellW/2} y={c.cy+cellH/2+4} textAnchor="middle"
                                        fontSize={Math.min(cellW,cellH)*0.45} fontWeight="900"
                                        fill={c.tpfp==='TP'?'rgba(134,239,172,0.95)':c.tpfp==='FP'?'rgba(253,224,71,0.95)':'rgba(252,165,165,0.95)'}>{icon}</text>}
                                </g>
                            );
                        })}
                        {/* Ground Truth 金色圆圈 */}
                        {cells.filter(c => c.isHit).map((c, i) => (
                            <circle key={i}
                                cx={c.cx + cellW/2} cy={c.cy + cellH/2}
                                r={Math.min(cellW, cellH)*0.32}
                                fill="none" stroke="#fbbf24" strokeWidth={2.5}
                                style={{filter:'drop-shadow(0 0 6px rgba(251,191,36,0.9))'}}
                            />
                        ))}
                        {/* 网格线 */}
                        {Array.from({length:cols+1},(_,i) => (
                            <line key={'vl'+i} x1={PAD.l+i*cellW} y1={PAD.t} x2={PAD.l+i*cellW} y2={PAD.t+plotH} stroke="rgba(51,65,85,0.25)" strokeWidth={0.5}/>
                        ))}
                        {Array.from({length:rows+1},(_,j) => (
                            <line key={'hl'+j} x1={PAD.l} y1={PAD.t+j*cellH} x2={PAD.l+plotW} y2={PAD.t+j*cellH} stroke="rgba(51,65,85,0.25)" strokeWidth={0.5}/>
                        ))}
                        {/* 轴标签 */}
                        {Array.from({length:cols},(_,i) => i%2===0 && (
                            <text key={'xl'+i} x={PAD.l+i*cellW+cellW/2} y={H-8} textAnchor="middle" fontSize={10} fill="#475569">{xMin+i}</text>
                        ))}
                        {Array.from({length:rows},(_,j) => j%2===0 && (
                            <text key={'yl'+j} x={PAD.l-4} y={PAD.t+j*cellH+cellH/2} textAnchor="end" dominantBaseline="middle" fontSize={10} fill="#475569">{yMax-j}</text>
                        ))}
                        {/* 图例 */}
                        <defs>
                            <linearGradient id="riskGrad" x1="0" x2="1" y1="0" y2="0">
                                <stop offset="0%" stopColor="#052e16"/>
                                <stop offset="25%" stopColor="#16a34a"/>
                                <stop offset="45%" stopColor="#84cc16"/>
                                <stop offset="55%" stopColor="#eab308"/>
                                <stop offset="70%" stopColor="#f97316"/>
                                <stop offset="85%" stopColor="#dc2626"/>
                                <stop offset="100%" stopColor="#7f1d1d"/>
                            </linearGradient>
                        </defs>
                        <rect x={W/2-60} y={H-22} width={120} height={10} rx={5} fill="url(#riskGrad)"/>
                        <text x={W/2-65} y={H-14} textAnchor="end" fontSize={10} fill="#64748b">安全</text>
                        <text x={W/2+65} y={H-14} textAnchor="start" fontSize={10} fill="#64748b">高危</text>
                    </svg>
                    {tooltip && (
                        <div style={{position:'fixed',left:tooltip.px+12,top:tooltip.py+12,background:'rgba(11,17,32,0.97)',border:'1px solid #334155',borderRadius:'6px',padding:'8px 12px',fontSize:'12px',color:'#f8fafc',zIndex:9999,pointerEvents:'none',lineHeight:'1.7'}}>
                            <b>网格 ({tooltip.x}, {tooltip.y})</b><br/>
                            风险: <b style={{color:parseFloat(tooltip.risk)>55?'#ef4444':parseFloat(tooltip.risk)>40?'#f97316':'#16a34a'}}>{tooltip.risk}%</b>
                            {showTPFP && <><br/><span style={{color:{TP:'#22c55e',FP:'#eab308',FN:'#ef4444',TN:'#94a3b8'}[tooltip.tpfp||'TN']}}>{{'TP':'✅ 正确预警','FP':'⚠️ 误报','FN':'❌ 漏报','TN':'🛡️ 正确安全'}[tooltip.tpfp||'TN']}</span></>}
                            {tooltip.isHit && !showTPFP && <><br/><span style={{color:'#fbbf24'}}>⚠️ 真实碰撞发生</span></>}
                        </div>
                    )}
                </div>
            );
        });

        const MainVisualization = memo(({ gridRaw, currentTime, onAreaClick, datasetName }) => {
            const cityLabel = datasetName === 'nyc' ? '纽约 New York City' : '芝加哥 Chicago';
            return (
                <div className="glass-panel p-4 flex-1 flex flex-col">
                    <div className="flex justify-between items-center mb-2">
                        <h3 className="text-lg font-bold text-textMain flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                            {cityLabel} · 时空风险热力网格
                        </h3>
                        <div className="flex items-center gap-2 text-xs text-amber-400 bg-amber-400/10 px-2 py-1 rounded border border-amber-400/30">
                            <div className="w-3 h-3 rounded-full border-2 border-amber-400 shadow-[0_0_6px_#fbbf24]"></div>
                            <span>金色圆圈 = 真实碰撞 Ground Truth</span>
                        </div>
                    </div>
                    <SVGHeatmap gridRaw={gridRaw} currentTime={currentTime} onAreaClick={onAreaClick} />
                </div>
            );
        });

        const ModelComparison = memo(({ datasetData }) => {
            const option = useMemo(() => ({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: { textStyle: { color: '#94a3b8' }, top: 0 },
                grid: { top: 30, bottom: 20, left: 35, right: 10 },
                xAxis: { type: 'category', data: datasetData.categories, axisLine: { lineStyle: { color: '#475569' } }, axisLabel: { fontSize: 10 } },
                yAxis: { type: 'value', min: 0.2, axisLine: { show: false }, splitLine: { lineStyle: { color: '#1e293b' } } },
                series: [
                    { name: 'AUC-PR', type: 'bar', data: datasetData.aucPr, itemStyle: { color: '#06b6d4', borderRadius: [4,4,0,0] } },
                    { name: 'F1 Score', type: 'bar', data: datasetData.f1, itemStyle: { color: '#8b5cf6', borderRadius: [4,4,0,0] } }
                ]
            }), [datasetData]);

            return (
                <div className="flex-1 flex flex-col pt-2">
                    <ReactECharts option={option} className="w-full flex-1 min-h-[250px]" />
                </div>
            );
        });

        const AblationStudy = memo(({ ablationData }) => {
            const option = useMemo(() => ({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: { textStyle: { color: '#94a3b8' }, top: 0 },
                grid: { top: 30, bottom: 40, left: 35, right: 10 },
                xAxis: { type: 'category', data: ablationData.categories, axisLabel: { fontSize: 10, rotate: 15 } },
                yAxis: { type: 'value', min: 0.4, axisLine: { show: false }, splitLine: { lineStyle: { color: '#1e293b' } } },
                series: [
                    { name: 'Recall', type: 'line', data: ablationData.recall, itemStyle: { color: '#f59e0b' }, symbolSize: 8, lineStyle: {width: 3} },
                    { name: 'F1 Score', type: 'bar', data: ablationData.f1, itemStyle: { color: '#06b6d4' } }
                ]
            }), [ablationData]);

            return (
                <div className="flex-1 flex flex-col pt-2">
                    <ReactECharts option={option} className="w-full flex-1 min-h-[250px]" />
                </div>
            );
        });


        // 功能5: 增强版全局趋势 — 显示平均风险 + Precision + Recall 三条线
        const GlobalTrend = memo(({ gridRaw, currentTime, timeCount, threshold }) => {
            const { riskData, precisionData, recallData } = useMemo(() => {
                if (!gridRaw || !gridRaw.length) return { riskData:[], precisionData:[], recallData:[] };
                const rArr=[], pArr=[], rRArr=[];
                for (let t = 0; t < timeCount; t++) {
                    let sum=0, tp=0, fp=0, fn=0;
                    gridRaw.forEach(g => {
                        const risk = sigmoid(g.flowSeries[t]);
                        const pred = risk >= threshold ? 1 : 0;
                        const label = g.labelSeries[t] === 1 ? 1 : 0;
                        sum += risk;
                        if(pred===1&&label===1) tp++; else if(pred===1&&label===0) fp++; else if(pred===0&&label===1) fn++;
                    });
                    rArr.push(parseFloat((sum/gridRaw.length).toFixed(4)));
                    pArr.push(tp+fp>0 ? parseFloat((tp/(tp+fp)).toFixed(4)) : 0);
                    rRArr.push(tp+fn>0 ? parseFloat((tp/(tp+fn)).toFixed(4)) : 0);
                }
                return { riskData:rArr, precisionData:pArr, recallData:rRArr };
            }, [gridRaw, timeCount, threshold]);

            const option = useMemo(() => ({
                tooltip: { trigger:'axis', formatter: p => `T=${p[0].name}<br/>${p.map(s=>`${s.marker}${s.seriesName}: <b>${(s.value*100).toFixed(1)}%</b>`).join('<br/>')}` },
                legend: { data:['均值风险','Precision','Recall'], textStyle:{color:'#94a3b8',fontSize:10}, top:0 },
                grid: { top:30, bottom:20, left:38, right:15 },
                xAxis: { type:'category', data:Array.from({length:timeCount},(_,i)=>i), axisLine:{lineStyle:{color:'#475569'}}, axisLabel:{fontSize:9} },
                yAxis: { type:'value', min:0, max:1, splitLine:{lineStyle:{color:'#1e293b',type:'dashed'}}, axisLabel:{formatter:v=>(v*100).toFixed(0)+'%',fontSize:9} },
                series: [
                    { name:'均值风险', type:'line', data:riskData, smooth:true, itemStyle:{color:'#ec4899'},
                      areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(236,72,153,0.35)'},{offset:1,color:'rgba(236,72,153,0.01)'}])},
                      markLine:{symbol:['none','none'],data:[{xAxis:currentTime}],lineStyle:{color:'#06b6d4',type:'dashed',width:2},label:{show:true,formatter:'T={c}',color:'#06b6d4'},animation:false}
                    },
                    { name:'Precision', type:'line', data:precisionData, smooth:true, itemStyle:{color:'#22c55e'}, lineStyle:{width:2}, symbol:'none' },
                    { name:'Recall',    type:'line', data:recallData,    smooth:true, itemStyle:{color:'#f59e0b'}, lineStyle:{width:2,type:'dashed'}, symbol:'none' }
                ],
                animationDurationUpdate:300
            }), [riskData, precisionData, recallData, currentTime, timeCount]);

            return (
                <div className="flex-1 flex flex-col pt-2">
                    <ReactECharts option={option} className="w-full flex-1 min-h-[250px]" />
                </div>
            );
        });

        // 功能2: 持久度热力图 — 所有时间步平均风险
        const PersistenceMap = memo(({ gridRaw }) => {
            const [tooltip, setTooltip] = useState(null);

            const bounds = useMemo(() => {
                if (!gridRaw||!gridRaw.length) return {xMin:0,xMax:9,yMin:0,yMax:9};
                return {xMin:Math.min(...gridRaw.map(g=>g.x)),xMax:Math.max(...gridRaw.map(g=>g.x)),
                        yMin:Math.min(...gridRaw.map(g=>g.y)),yMax:Math.max(...gridRaw.map(g=>g.y))};
            }, [gridRaw]);

            const avgCells = useMemo(() => {
                if(!gridRaw) return [];
                return gridRaw.map(g => {
                    const avg = g.flowSeries.reduce((s,v)=>s+sigmoid(v),0)/g.flowSeries.length;
                    const hitCount = g.labelSeries.filter(v=>v===1).length;
                    return {...g, avg, hitCount};
                });
            },[gridRaw]);

            const avgColor = (v) => {
                const stops=[[0,'#052e16'],[0.25,'#16a34a'],[0.45,'#84cc16'],[0.55,'#eab308'],[0.7,'#f97316'],[0.85,'#dc2626'],[1,'#7f1d1d']];
                let lo=stops[0],hi=stops[stops.length-1];
                for(let i=0;i<stops.length-1;i++){if(v>=stops[i][0]&&v<=stops[i+1][0]){lo=stops[i];hi=stops[i+1];break;}}
                const p=c=>[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
                const [lr,lg,lb]=p(lo[1]),[hr,hg,hb]=p(hi[1]);
                const t=lo[0]===hi[0]?0:(v-lo[0])/(hi[0]-lo[0]);
                return `rgb(${Math.round(lr+(hr-lr)*t)},${Math.round(lg+(hg-lg)*t)},${Math.round(lb+(hb-lb)*t)})`;
            };

            const W=760,H=330,PAD={t:8,r:10,b:26,l:30};
            const {xMin,xMax,yMin,yMax}=bounds;
            const cols=xMax-xMin+1,rows=yMax-yMin+1;
            const plotW=W-PAD.l-PAD.r,plotH=H-PAD.t-PAD.b;
            const cellW=plotW/cols,cellH=plotH/rows;

            return (
                <div className="flex-1 flex flex-col pt-1" style={{position:'relative'}}>
                    <div className="text-xs text-textMuted mb-1 text-center">全时段平均风险 · 🟡数字=历史碰撞次数</div>
                    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block',background:'#0d1526',borderRadius:'8px'}}
                        onMouseLeave={()=>setTooltip(null)}>
                        {avgCells.map((c,i)=>{
                            const cx=PAD.l+(c.x-xMin)*cellW;
                            const cy=PAD.t+(rows-1-(c.y-yMin))*cellH;
                            return <g key={i}>
                                <rect x={cx+1} y={cy+1} width={cellW-2} height={cellH-2}
                                    fill={avgColor(c.avg)} fillOpacity={0.92}
                                    stroke={c.avg>0.6?'rgba(239,68,68,0.5)':'rgba(51,65,85,0.3)'} strokeWidth={c.avg>0.6?1.5:0.5}
                                    style={{cursor:'pointer'}}
                                    onMouseEnter={e=>setTooltip({x:c.x,y:c.y,avg:(c.avg*100).toFixed(1),hits:c.hitCount,px:e.clientX,py:e.clientY})}
                                    onMouseMove={e=>setTooltip(t=>t?{...t,px:e.clientX,py:e.clientY}:null)}
                                />
                                {c.hitCount>0&&<text x={cx+cellW/2} y={cy+cellH/2+4} textAnchor="middle"
                                    fontSize={Math.min(cellW,cellH)*0.42} fill="rgba(251,191,36,0.95)" fontWeight="bold">{c.hitCount}</text>}
                            </g>;
                        })}
                        {Array.from({length:cols+1},(_,i)=><line key={'v'+i} x1={PAD.l+i*cellW} y1={PAD.t} x2={PAD.l+i*cellW} y2={PAD.t+plotH} stroke="rgba(51,65,85,0.2)" strokeWidth={0.5}/>)}
                        {Array.from({length:rows+1},(_,j)=><line key={'h'+j} x1={PAD.l} y1={PAD.t+j*cellH} x2={PAD.l+plotW} y2={PAD.t+j*cellH} stroke="rgba(51,65,85,0.2)" strokeWidth={0.5}/>)}
                        <defs><linearGradient id="avgGrad" x1="0" x2="1"><stop offset="0%" stopColor="#052e16"/><stop offset="45%" stopColor="#84cc16"/><stop offset="70%" stopColor="#f97316"/><stop offset="100%" stopColor="#7f1d1d"/></linearGradient></defs>
                        <rect x={W/2-50} y={H-16} width={100} height={7} rx={3} fill="url(#avgGrad)"/>
                        <text x={W/2-55} y={H-8} textAnchor="end" fontSize={9} fill="#64748b">安全</text>
                        <text x={W/2+55} y={H-8} textAnchor="start" fontSize={9} fill="#64748b">高危</text>
                    </svg>
                    {tooltip&&<div style={{position:'fixed',left:tooltip.px+12,top:tooltip.py+12,background:'rgba(11,17,32,0.97)',border:'1px solid #334155',borderRadius:'6px',padding:'6px 10px',fontSize:'11px',color:'#f8fafc',zIndex:9999,pointerEvents:'none',lineHeight:'1.6'}}>
                        <b>网格({tooltip.x},{tooltip.y})</b><br/>
                        均值风险: <b style={{color:parseFloat(tooltip.avg)>55?'#ef4444':'#16a34a'}}>{tooltip.avg}%</b><br/>
                        碰撞频次: <b style={{color:'#fbbf24'}}>{tooltip.hits}次</b>
                    </div>}
                </div>
            );
        });

        // 功能1: 实时混淆矩阵
        const ConfusionMatrix = memo(({ gridRaw, currentTime, threshold }) => {
            const stats = useMemo(() => {
                if (!gridRaw||!gridRaw.length) return {tp:0,fp:0,fn:0,tn:0,precision:0,recall:0,f1:0};
                let tp=0,fp=0,fn=0,tn=0;
                gridRaw.forEach(g => {
                    const pred = sigmoid(g.flowSeries[currentTime]) >= threshold ? 1 : 0;
                    const label = g.labelSeries[currentTime] === 1 ? 1 : 0;
                    if(pred===1&&label===1) tp++; else if(pred===1&&label===0) fp++;
                    else if(pred===0&&label===1) fn++; else tn++;
                });
                const precision = tp+fp>0?tp/(tp+fp):0;
                const recall    = tp+fn>0?tp/(tp+fn):0;
                const f1 = precision+recall>0?2*precision*recall/(precision+recall):0;
                return {tp,fp,fn,tn,precision,recall,f1};
            },[gridRaw,currentTime,threshold]);

            const SCell = ({label,val,bg,desc}) => (
                <div style={{background:bg,borderRadius:'8px',padding:'10px 6px',textAlign:'center',flex:1}}>
                    <div style={{fontSize:'9px',color:'rgba(255,255,255,0.65)',marginBottom:'2px'}}>{label}</div>
                    <div style={{fontSize:'22px',fontWeight:'900',color:'#fff',lineHeight:1}}>{val}</div>
                    <div style={{fontSize:'9px',color:'rgba(255,255,255,0.45)',marginTop:'2px'}}>{desc}</div>
                </div>
            );

            return (
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                    <div style={{fontSize:'10px',color:'#94a3b8',fontWeight:'bold'}}>实时混淆矩阵 · T={currentTime} · 阈值={threshold.toFixed(2)}</div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'5px'}}>
                        <SCell label="TP ✅" val={stats.tp} bg="rgba(22,163,74,0.28)" desc="预警命中"/>
                        <SCell label="FP ⚠️" val={stats.fp} bg="rgba(234,179,8,0.22)" desc="误报"/>
                        <SCell label="FN ❌" val={stats.fn} bg="rgba(239,68,68,0.28)" desc="漏报"/>
                        <SCell label="TN 🛡️" val={stats.tn} bg="rgba(6,182,212,0.12)" desc="正确安全"/>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'5px'}}>
                        {[['Precision',stats.precision,'#22c55e'],['Recall',stats.recall,'#f59e0b'],['F1',stats.f1,'#a78bfa']].map(([n,v,c])=>(
                            <div key={n} style={{background:'rgba(17,24,39,0.8)',border:`1px solid ${c}40`,borderRadius:'6px',padding:'7px 4px',textAlign:'center'}}>
                                <div style={{fontSize:'9px',color:'#94a3b8'}}>{n}</div>
                                <div style={{fontSize:'15px',fontWeight:'800',color:c}}>{(v*100).toFixed(1)}%</div>
                            </div>
                        ))}
                    </div>
                    <div style={{fontSize:'9px',color:'#475569',textAlign:'center'}}>调整顶部阈值滑块观察实时变化 →</div>
                </div>
            );
        });

        // =====================================================
        // 功能A: PR 曲线组件（全阈值扫描 — 对齐 AUC-PR 数值）
        // =====================================================
        const PRCurveChart = memo(({ nycGrid, chiGrid, threshold, timeCount }) => {
            const computePRCurve = useCallback((grid) => {
                if (!grid || !grid.length) return [];
                const thresholds = Array.from({length:51}, (_,i) => i/50);
                return thresholds.map(th => {
                    let tp=0,fp=0,fn=0;
                    for (let t=0; t<timeCount; t++) {
                        grid.forEach(g => {
                            const pred = sigmoid(g.flowSeries[t]) >= th ? 1 : 0;
                            const label = g.labelSeries[t]===1 ? 1 : 0;
                            if(pred===1&&label===1) tp++;
                            else if(pred===1&&label===0) fp++;
                            else if(pred===0&&label===1) fn++;
                        });
                    }
                    const prec = tp+fp>0 ? tp/(tp+fp) : 1;
                    const rec  = tp+fn>0 ? tp/(tp+fn) : 0;
                    return [rec, prec];
                });
            }, [timeCount]);

            const nycPR  = useMemo(() => computePRCurve(nycGrid),  [nycGrid,  computePRCurve]);
            const chiPR  = useMemo(() => computePRCurve(chiGrid),  [chiGrid,  computePRCurve]);

            // 当前阈值对应点
            const getPoint = (grid, th) => {
                if (!grid||!grid.length) return [0,0];
                let tp=0,fp=0,fn=0;
                for(let t=0;t<timeCount;t++){
                    grid.forEach(g => {
                        const pred=sigmoid(g.flowSeries[t])>=th?1:0;
                        const label=g.labelSeries[t]===1?1:0;
                        if(pred===1&&label===1)tp++; else if(pred===1&&label===0)fp++; else if(pred===0&&label===1)fn++;
                    });
                }
                return [tp+fn>0?tp/(tp+fn):0, tp+fp>0?tp/(tp+fp):1];
            };
            const nycPt = useMemo(()=>getPoint(nycGrid,threshold),[nycGrid,threshold,timeCount]);
            const chiPt = useMemo(()=>getPoint(chiGrid,threshold),[chiGrid,threshold,timeCount]);

            const option = useMemo(() => ({
                tooltip: { trigger:'axis', formatter: p => `Recall: ${(p[0].value[0]*100).toFixed(1)}%<br/>Precision: ${(p[0].value[1]*100).toFixed(1)}%` },
                legend: { data:['NYC','Chicago'], textStyle:{color:'#94a3b8',fontSize:10}, top:0 },
                grid: { top:30, bottom:30, left:42, right:15 },
                xAxis: { type:'value', name:'Recall', nameTextStyle:{color:'#64748b',fontSize:10}, min:0, max:1,
                    axisLabel:{formatter:v=>(v*100).toFixed(0)+'%',fontSize:9}, splitLine:{lineStyle:{color:'#1e293b',type:'dashed'}} },
                yAxis: { type:'value', name:'Precision', nameTextStyle:{color:'#64748b',fontSize:10,padding:[0,0,0,-30]}, min:0, max:1,
                    axisLabel:{formatter:v=>(v*100).toFixed(0)+'%',fontSize:9}, splitLine:{lineStyle:{color:'#1e293b',type:'dashed'}} },
                series: [
                    { name:'NYC', type:'line', data:nycPR, smooth:false, showSymbol:false,
                      itemStyle:{color:'#06b6d4'}, lineStyle:{width:2},
                      areaStyle:{color:'rgba(6,182,212,0.08)'},
                      markPoint:{data:[{coord:nycPt,itemStyle:{color:'#06b6d4'},symbol:'circle',symbolSize:10,
                        label:{show:true,formatter:`T=${threshold.toFixed(2)}`,fontSize:8,color:'#06b6d4',position:'top'}}]}
                    },
                    { name:'Chicago', type:'line', data:chiPR, smooth:false, showSymbol:false,
                      itemStyle:{color:'#8b5cf6'}, lineStyle:{width:2,type:'dashed'},
                      markPoint:{data:[{coord:chiPt,itemStyle:{color:'#8b5cf6'},symbol:'circle',symbolSize:10}]}
                    }
                ]
            }), [nycPR, chiPR, nycPt, chiPt, threshold]);

            return (
                <div className="flex-1 flex flex-col pt-1">
                    <div className="text-xs text-textMuted text-center mb-1">全阈值扫描 Precision-Recall 曲线 · 面积≈AUC-PR</div>
                    <ReactECharts option={option} className="w-full flex-1 min-h-[240px]" />
                </div>
            );
        });

        // =====================================================
        // 功能C: 风险分布直方图（当前时步所有格子的风险分布）
        // =====================================================
        const RiskHistogram = memo(({ gridRaw, currentTime, threshold }) => {
            const { bins, maxCount } = useMemo(() => {
                if (!gridRaw||!gridRaw.length) return { bins:[], maxCount:1 };
                const BINS=10;
                const counts = Array(BINS).fill(0);
                const hitCounts = Array(BINS).fill(0);
                gridRaw.forEach(g => {
                    const risk = sigmoid(g.flowSeries[currentTime]);
                    const isHit = g.labelSeries[currentTime]===1;
                    const idx = Math.min(Math.floor(risk*BINS), BINS-1);
                    counts[idx]++;
                    if(isHit) hitCounts[idx]++;
                });
                const bins = counts.map((c,i)=>({
                    label:`${i*10}%-${(i+1)*10}%`,
                    lo:i/BINS, hi:(i+1)/BINS,
                    count:c, hits:hitCounts[i]
                }));
                return { bins, maxCount: Math.max(...counts, 1) };
            }, [gridRaw, currentTime]);

            const threshBin = Math.min(Math.floor(threshold*10), 9);
            const option = useMemo(() => ({
                tooltip: { trigger:'axis', formatter: p => {
                    const b = bins[p[0].dataIndex];
                    return b ? `风险 ${b.label}<br/>格子数: <b>${b.count}</b><br/>命中 GT: <b style="color:#fbbf24">${b.hits}</b>` : '';
                }},
                grid: { top:20, bottom:35, left:35, right:10 },
                xAxis: { type:'category', data:bins.map(b=>b.label), axisLabel:{rotate:30,fontSize:8,color:'#64748b'}, axisLine:{lineStyle:{color:'#334155'}} },
                yAxis: { type:'value', splitLine:{lineStyle:{color:'#1e293b',type:'dashed'}}, axisLabel:{fontSize:9} },
                series: [
                    { name:'格子数', type:'bar', data:bins.map((b,i)=>({
                        value:b.count,
                        itemStyle:{color: i>=threshBin ? 'rgba(239,68,68,0.75)' : 'rgba(22,163,74,0.65)', borderRadius:[3,3,0,0]}
                    })),
                      markLine:{symbol:['none','none'],data:[{xAxis:threshBin-0.5}],
                        lineStyle:{color:'#f59e0b',type:'dashed',width:2},
                        label:{show:true,formatter:`阈值=${threshold.toFixed(2)}`,color:'#f59e0b',fontSize:9}}
                    },
                    { name:'Ground Truth', type:'bar', data:bins.map(b=>({value:b.hits, itemStyle:{color:'rgba(251,191,36,0.85)',borderRadius:[3,3,0,0]}})), barGap:'-100%', barMaxWidth:6 }
                ]
            }), [bins, threshBin, threshold]);

            return (
                <div className="flex-1 flex flex-col pt-1">
                    <div className="flex justify-between items-center text-xs mb-1">
                        <span className="text-textMuted">T={currentTime} 风险分布</span>
                        <span className="flex gap-2">
                            <span style={{color:'rgba(22,163,74,0.9)'}}>■ 安全</span>
                            <span style={{color:'rgba(239,68,68,0.9)'}}>■ 高危</span>
                            <span style={{color:'rgba(251,191,36,0.9)'}}>■ GT</span>
                        </span>
                    </div>
                    <ReactECharts option={option} className="w-full flex-1 min-h-[220px]" />
                </div>
            );
        });


        // =====================================================
        // 功能D: 增强版区域详情面板（GT时序叠加 + T-1/T/T+1对比）
        // =====================================================
        const DetailPanel = memo(({ areaData, currentTime, timeCount }) => {
            if (!areaData) {
                return (
                    <div className="bg-panelBg rounded border border-borderBorder p-4 flex-1 flex flex-col justify-center items-center text-textMuted">
                        <p className="text-sm">请点击左侧热力图网格</p>
                        <p className="text-xs mt-1 opacity-60">查看区域深度分析</p>
                    </div>
                );
            }

            const currentRisk = sigmoid(areaData.flowSeries[currentTime]);
            const isHit = areaData.labelSeries[currentTime] === 1;
            const trendData = areaData.flowSeries.map(v => sigmoid(v));
            const gtData = areaData.labelSeries.map(v => v===1 ? 1 : 0);
            const tc = trendData.length;

            // 增强趋势图：同时显示预测风险 + GT标签
            const trendOption = {
                grid: { top:8, bottom:18, left:28, right:8 },
                xAxis: { type:'category', data:Array.from({length:tc},(_,i)=>i),
                    axisLine:{lineStyle:{color:'#334155'}}, axisLabel:{fontSize:8,color:'#64748b'} },
                yAxis: { type:'value', min:0, max:1, splitLine:{show:false}, axisLabel:{fontSize:8} },
                tooltip: { trigger:'axis', formatter: p => `T=${p[0].name}<br/>风险:${(p[0].value*100).toFixed(1)}%${p[1]&&p[1].value?' <b style="color:#fbbf24">⚠️ 碰撞</b>':''}` },
                series: [
                    { type:'line', data:trendData, smooth:true, itemStyle:{color:'#ef4444'}, lineStyle:{width:2},
                      areaStyle:{color:'rgba(239,68,68,0.15)'},
                      markPoint:{ data:[{coord:[currentTime,trendData[currentTime]],itemStyle:{color:'#06b6d4'},symbolSize:10}] }
                    },
                    { type:'bar', data:gtData.map((v,i)=>({value:v*0.95, itemStyle:{color:'rgba(251,191,36,0.7)'}})),
                      barMaxWidth:6, z:0, name:'Ground Truth' }
                ],
                animationDurationUpdate:300
            };

            // T-1 / T / T+1 三格对比
            const riskColor = (v) => {
                if(v>=0.7) return '#dc2626'; if(v>=0.5) return '#f97316';
                if(v>=0.35) return '#eab308'; if(v>=0.2) return '#84cc16'; return '#16a34a';
            };
            const neighbors = [-1,0,1].map(delta => {
                const t = Math.max(0, Math.min(tc-1, currentTime+delta));
                const risk = trendData[t];
                const hit = areaData.labelSeries[t]===1;
                return { t, risk, hit, delta };
            });

            return (
                <div className="bg-panelBg rounded border border-borderBorder p-3 flex-1 flex flex-col gap-2" style={{minHeight:0}}>
                    <h3 className="font-bold border-b border-borderBorder pb-1 text-primary text-sm">
                        🔍 网格 ({areaData.x}, {areaData.y}) 深度分析
                    </h3>
                    {/* 当前风险 + 状态 */}
                    <div className="flex items-center justify-between">
                        <div>
                            <div className="text-xs text-textMuted">当前风险 T={currentTime}</div>
                            <div className={`text-xl font-bold`} style={{color:riskColor(currentRisk)}}>
                                {(currentRisk*100).toFixed(1)}%
                            </div>
                        </div>
                        <div className="text-right">
                            {isHit ? <span className="text-amber-400 font-bold text-xs">⚠️ 碰撞发生</span>
                                   : <span className="text-green-400 text-xs">✅ 安全</span>}
                        </div>
                    </div>
                    {/* T-1 / T / T+1 时刻对比 */}
                    <div className="flex gap-1">
                        {neighbors.map(n=>(
                            <div key={n.delta} style={{flex:1, textAlign:'center', padding:'5px 3px', borderRadius:'6px',
                                background: n.delta===0?'rgba(6,182,212,0.12)':'rgba(17,24,39,0.5)',
                                border: n.delta===0?'1px solid rgba(6,182,212,0.4)':'1px solid rgba(51,65,85,0.3)'}}>
                                <div style={{fontSize:'9px',color:'#64748b'}}>{n.delta<0?`T-${-n.delta}`:n.delta===0?'T=当前':`T+${n.delta}`}</div>
                                <div style={{fontSize:'15px',fontWeight:'800',color:riskColor(n.risk)}}>{(n.risk*100).toFixed(0)}%</div>
                                {n.hit&&<div style={{fontSize:'9px',color:'#fbbf24'}}>⚠️</div>}
                            </div>
                        ))}
                    </div>
                    {/* 增强趋势图：风险 + GT叠加 */}
                    <div style={{height:'90px',flexShrink:0}}>
                        <ReactECharts option={trendOption} className="w-full h-full" />
                    </div>
                </div>
            );
        });


        const ActiveAlerts = memo(({ gridRaw, currentTime, threshold }) => {
            const alerts = useMemo(() => {
                if(!gridRaw || !gridRaw.length) return [];
                const sorted = gridRaw.map(g => ({
                    x: g.x, y: g.y, risk: sigmoid(g.flowSeries[currentTime]), isHit: g.labelSeries[currentTime] === 1
                })).sort((a, b) => b.risk - a.risk).slice(0, 3);
                return sorted;
            }, [gridRaw, currentTime]);

            return (
                <div className="mt-4 p-3 rounded bg-panelBg border border-danger/30 flex flex-col" style={{height: '180px'}}>
                    <h4 className="text-sm font-bold text-danger flex items-center gap-2 mb-2 border-b border-danger/20 pb-2">
                        <span className="animate-pulse">🚨</span> 实时高危预警 Top 3
                    </h4>
                    <div className="flex flex-col gap-2 overflow-y-auto custom-scrollbar flex-1">
                        {alerts.map((a, i) => (
                            <div key={i} className={`flex justify-between items-center p-2 rounded text-xs ${a.risk >= threshold ? 'bg-danger/10 border border-danger/30' : 'bg-primary/5 border border-primary/20'}`}>
                                <div>
                                    <div className="font-mono text-textMain font-bold">网格 ({a.x}, {a.y})</div>
                                    {a.isHit && <div className="text-[10px] text-amber-400 mt-0.5">⚠️ 已命中 Ground Truth</div>}
                                </div>
                                <div className={`font-bold text-lg ${a.risk >= threshold ? 'text-danger' : 'text-primary'}`}>
                                    {(a.risk * 100).toFixed(1)}%
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        });

        // ==========================================
        // 4. 主页面组件
        // ==========================================
        const App = () => {
            const [data, setData] = useState(null);
            const [datasetId, setDatasetId] = useState('nyc');
            const [currentTime, setCurrentTime] = useState(0);
            const [selectedArea, setSelectedArea] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [threshold, setThreshold] = useState(0.50);
            const [activeLeftTab, setActiveLeftTab] = useState(0);
            const [activeRightTab, setActiveRightTab] = useState(0);  // 0=区域详情 1=混淆矩阵 2=风险分布
            const [showTPFP, setShowTPFP] = useState(false);
            const [compareMode, setCompareMode] = useState(false);
            const [snapFlash, setSnapFlash] = useState(false);        // 功能E: 截图闪烁效果
            const dashboardRef = React.useRef(null);

            useEffect(() => { fetchExperimentData().then(res => setData(res)); }, []);
            useEffect(() => {
                let interval;
                if (isPlaying && data) { interval = setInterval(() => setCurrentTime(prev => (prev+1)%data.timeCount), 800); }
                return () => clearInterval(interval);
            }, [isPlaying, data]);

            // 功能B: 键盘快捷键
            useEffect(() => {
                if (!data) return;
                const handler = (e) => {
                    if (e.target.tagName==='INPUT') return;
                    switch(e.key) {
                        case ' ': e.preventDefault(); setIsPlaying(p => !p); break;
                        case 'ArrowRight': e.preventDefault(); setIsPlaying(false); setCurrentTime(t => Math.min(data.timeCount-1, t+1)); break;
                        case 'ArrowLeft':  e.preventDefault(); setIsPlaying(false); setCurrentTime(t => Math.max(0, t-1)); break;
                        case '+': case '=': setThreshold(t => Math.min(0.9, parseFloat((t+0.05).toFixed(2)))); break;
                        case '-': setThreshold(t => Math.max(0.1, parseFloat((t-0.05).toFixed(2)))); break;
                        case 'c': case 'C': setCompareMode(p => !p); break;
                        case 't': case 'T': setShowTPFP(p => !p); break;
                    }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [data]);

            // 功能E: 截图导出
            const handleScreenshot = useCallback(async () => {
                if (!dashboardRef.current) return;
                setSnapFlash(true);
                setTimeout(() => setSnapFlash(false), 400);
                try {
                    const canvas = await html2canvas(dashboardRef.current, {
                        backgroundColor: '#0b1120', scale: 1.5, useCORS: true, logging: false
                    });
                    const link = document.createElement('a');
                    link.download = `traffic_risk_dashboard_T${currentTime}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch(e) {
                    // 降级：SVG截图
                    const svgEl = dashboardRef.current.querySelector('svg');
                    if (svgEl) {
                        const blob = new Blob([svgEl.outerHTML], {type:'image/svg+xml'});
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a'); link.download='heatmap.svg'; link.href=url; link.click();
                    }
                }
            }, [currentTime]);

            const handleDatasetSwitch = (newId) => {
                setDatasetId(newId); setSelectedArea(null); setCurrentTime(0); setIsPlaying(false); setCompareMode(false);
            };

            const gridRaw = data ? data.raw[datasetId].grid : [];
            const nycGrid = data ? data.raw['nyc'].grid : [];
            const chiGrid = data ? data.raw['chicago'].grid : [];
            const currentMetricsInfo = data ? METRICS_DATA[datasetId] : null;

            const currentHighRiskCount = useMemo(() => {
                if(!gridRaw.length) return 0;
                return gridRaw.filter(g => sigmoid(g.flowSeries[currentTime]) >= threshold).length;
            }, [gridRaw, currentTime, threshold]);

            const handleAreaClick = useCallback((x, y) => {
                const area = gridRaw.find(g => g.x===x && g.y===y);
                setSelectedArea(area);
                setActiveRightTab(0);
            }, [gridRaw]);

            if (!data) return <div className="flex items-center justify-center h-screen text-xl text-primary animate-pulse">正在加载双城市真实数据流...</div>;


            // 功能3: 双城对比布局
            const CompareView = () => (
                <div className="flex gap-3 flex-1" style={{minHeight:'480px'}}>
                    <div className="flex-1 glass-panel p-3 flex flex-col">
                        <div className="flex items-center gap-2 mb-2">
                            <span className="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                            <span className="font-bold text-sm">🗽 New York City</span>
                            <span className="text-xs text-textMuted ml-auto">AUC-PR: {METRICS_DATA.nyc.mainMetricValue}</span>
                        </div>
                        <SVGHeatmap gridRaw={nycGrid} currentTime={currentTime} onAreaClick={handleAreaClick} threshold={threshold} showTPFP={showTPFP} />
                    </div>
                    <div className="flex-1 glass-panel p-3 flex flex-col">
                        <div className="flex items-center gap-2 mb-2">
                            <span className="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
                            <span className="font-bold text-sm">🏙️ Chicago</span>
                            <span className="text-xs text-textMuted ml-auto">AUC-PR: {METRICS_DATA.chicago.mainMetricValue}</span>
                        </div>
                        <SVGHeatmap gridRaw={chiGrid} currentTime={currentTime} onAreaClick={(x,y)=>{ const area=chiGrid.find(g=>g.x===x&&g.y===y); setSelectedArea(area); }} threshold={threshold} showTPFP={showTPFP} />
                    </div>
                </div>
            );

            return (
                <div ref={dashboardRef} className="flex flex-col gap-4 h-full min-h-[95vh]" style={{position:'relative'}}>
                    {/* 功能E: 截图闪光效果 */}
                    {snapFlash && <div style={{position:'fixed',inset:0,background:'rgba(255,255,255,0.15)',zIndex:9999,pointerEvents:'none',borderRadius:'8px'}} className="snap-flash"/>}

                    {/* Header */}
                    <header className="glass-panel px-6 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-3 flex-wrap">
                            <div>
                                <h1 className="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">
                                    深度时空自适应风险预警平台 (Myplan)
                                </h1>
                                <p className="text-xs text-textMuted mt-0.5 flex items-center gap-2">
                                    支持多城市双轨数据推演
                                    <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold border ${data.isDemo?'bg-amber-500/10 text-amber-400 border-amber-500/30':'bg-green-500/10 text-green-400 border-green-500/30'}`}>
                                        {data.isDemo?"⚠ 备用数据模式":"✅ frontend_real_data.json"}
                                    </span>
                                </p>
                            </div>
                            {/* 城市切换 */}
                            {!compareMode && <div className="flex bg-panelBg rounded-lg p-1 border border-borderBorder">
                                <button onClick={()=>handleDatasetSwitch('nyc')} className={`px-3 py-1.5 rounded-md text-xs font-bold transition-all ${datasetId==='nyc'?'bg-primary text-darkBg shadow':'text-textMuted hover:text-textMain'}`}>🗽 NYC</button>
                                <button onClick={()=>handleDatasetSwitch('chicago')} className={`px-3 py-1.5 rounded-md text-xs font-bold transition-all ${datasetId==='chicago'?'bg-secondary text-darkBg shadow':'text-textMuted hover:text-textMain'}`}>🏙️ Chicago</button>
                            </div>}
                            {/* 功能按钮组 */}
                            <button onClick={()=>setCompareMode(!compareMode)} className={`px-2.5 py-1.5 rounded-lg text-xs font-bold border transition-all ${compareMode?'bg-secondary/20 text-secondary border-secondary/50':'bg-panelBg text-textMuted border-borderBorder hover:text-secondary'}`}>
                                {compareMode?'✖ 退出对比':'⚖ 双城对比'} <kbd className="kbd-hint">C</kbd>
                            </button>
                            <button onClick={()=>setShowTPFP(!showTPFP)} className={`px-2.5 py-1.5 rounded-lg text-xs font-bold border transition-all ${showTPFP?'bg-amber-500/20 text-amber-400 border-amber-500/50':'bg-panelBg text-textMuted border-borderBorder hover:text-amber-400'}`}>
                                {showTPFP?'✖ 关闭标注':'🏷 TP/FP/FN'} <kbd className="kbd-hint">T</kbd>
                            </button>
                            {/* 功能E: 截图按钮 */}
                            <button onClick={handleScreenshot} className="px-2.5 py-1.5 rounded-lg text-xs font-bold border bg-panelBg text-textMuted border-borderBorder hover:text-cyan-400 hover:border-cyan-400/50 transition-all">
                                📸 截图导出
                            </button>
                        </div>

                        <div className="flex flex-col items-end gap-2">
                            <div className="flex items-center gap-3 text-sm text-textMuted bg-panelBg px-3 py-1.5 rounded border border-borderBorder">
                                <span className="text-xs">⚠️ 阈值: <span className="font-bold text-primary">{threshold.toFixed(2)}</span></span>
                                <input type="range" min="0.1" max="0.9" step="0.05" value={threshold}
                                    onChange={e=>setThreshold(parseFloat(e.target.value))} className="w-24 accent-primary cursor-pointer"/>
                                <span className="text-xs text-borderBorder"><kbd className="kbd-hint">+</kbd><kbd className="kbd-hint">-</kbd></span>
                            </div>
                            <div className="text-sm font-mono flex items-center gap-2">
                                <button onClick={()=>setIsPlaying(!isPlaying)}
                                    className={`px-3 py-1 rounded font-bold text-xs transition-all ${isPlaying?'bg-danger text-white animate-play-pulse':'bg-primary text-darkBg hover:bg-primary/80'}`}>
                                    {isPlaying?'⏸ 停止':'▶ 演变'} <kbd className="kbd-hint" style={{background:'rgba(0,0,0,0.2)',border:'1px solid rgba(255,255,255,0.2)',color:'rgba(255,255,255,0.7)'}}>Space</kbd>
                                </button>
                                <div className="flex gap-1">
                                    <button onClick={()=>{setIsPlaying(false);setCurrentTime(Math.max(0,currentTime-1));}}
                                        className="bg-panelBg border border-borderBorder px-2 py-1 rounded text-textMuted hover:text-primary disabled:opacity-40 text-xs" disabled={currentTime===0}>◀ <kbd className="kbd-hint">←</kbd></button>
                                    <span className="bg-panelBg border border-borderBorder px-3 py-1 rounded text-xs">
                                        T={currentTime}<span className="text-borderBorder">/{data.timeCount-1}</span>
                                    </span>
                                    <button onClick={()=>{setIsPlaying(false);setCurrentTime(Math.min(data.timeCount-1,currentTime+1));}}
                                        className="bg-panelBg border border-borderBorder px-2 py-1 rounded text-textMuted hover:text-primary disabled:opacity-40 text-xs" disabled={currentTime===data.timeCount-1}><kbd className="kbd-hint">→</kbd> ▶</button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* 指标卡 */}
                    <div className="grid grid-cols-4 gap-4">
                        <MetricCard title={`触发预警网格数 (>${threshold.toFixed(2)})`} value={currentHighRiskCount} isDanger={true} subtext="随时间切片与阈值实时跳动"/>
                        <MetricCard title="全局 Recall 召回率" value={currentMetricsInfo.recall} subtext="相较基线显著提升"/>
                        <MetricCard title="全局 F1 Score" value={currentMetricsInfo.f1} subtext="Myplan 完整模型打分"/>
                        <MetricCard title="核心指标 AUC-PR" value={currentMetricsInfo.mainMetricValue} subtext={`基于 ${compareMode?'NYC+CHI':datasetId.toUpperCase()} 测试集`}/>
                    </div>

                    {/* 主布局 */}
                    {compareMode ? (
                        <div className="flex gap-4 flex-1" style={{minHeight:'520px'}}>
                            <div className="w-72 flex flex-col glass-panel p-4 overflow-y-auto custom-scrollbar">
                                <h3 className="text-xs font-bold text-textMuted mb-3 border-b border-borderBorder pb-2">双城同步混淆矩阵</h3>
                                <div className="mb-3"><div className="text-xs text-primary font-bold mb-1">🗽 NYC</div><ConfusionMatrix gridRaw={nycGrid} currentTime={currentTime} threshold={threshold}/></div>
                                <div className="mt-3 border-t border-borderBorder pt-3"><div className="text-xs text-secondary font-bold mb-1">🏙️ Chicago</div><ConfusionMatrix gridRaw={chiGrid} currentTime={currentTime} threshold={threshold}/></div>
                            </div>
                            {/* CompareView inline */}
                            <div className="flex gap-3 flex-1">
                                <div className="flex-1 glass-panel p-3 flex flex-col">
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                                        <span className="font-bold text-sm">🗽 New York City</span>
                                        <span className="text-xs text-textMuted ml-auto">AUC-PR: {METRICS_DATA.nyc.mainMetricValue}</span>
                                    </div>
                                    <SVGHeatmap gridRaw={nycGrid} currentTime={currentTime} onAreaClick={handleAreaClick} threshold={threshold} showTPFP={showTPFP}/>
                                </div>
                                <div className="flex-1 glass-panel p-3 flex flex-col">
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
                                        <span className="font-bold text-sm">🏙️ Chicago</span>
                                        <span className="text-xs text-textMuted ml-auto">AUC-PR: {METRICS_DATA.chicago.mainMetricValue}</span>
                                    </div>
                                    <SVGHeatmap gridRaw={chiGrid} currentTime={currentTime} onAreaClick={(x,y)=>{const area=chiGrid.find(g=>g.x===x&&g.y===y);setSelectedArea(area);}} threshold={threshold} showTPFP={showTPFP}/>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex gap-4 flex-1 h-[520px]">
                            {/* 左侧面板 - 5个Tab */}
                            <div className="w-1/4 flex flex-col glass-panel p-3">
                                <div className="flex border-b border-borderBorder mb-2 overflow-x-auto gap-0.5">
                                    {['基线对比','消融实验','全局趋势','持久风险','PR曲线'].map((t,i)=>(
                                        <button key={i}
                                            className={`flex-shrink-0 px-2 pb-1.5 text-[10px] font-bold transition-colors ${activeLeftTab===i?'text-primary border-b-2 border-primary':'text-textMuted hover:text-textMain'}`}
                                            onClick={()=>setActiveLeftTab(i)}>{t}</button>
                                    ))}
                                </div>
                                <div className="flex-1 flex flex-col relative overflow-hidden">
                                    {activeLeftTab===0 && <ModelComparison datasetData={currentMetricsInfo.models}/>}
                                    {activeLeftTab===1 && <AblationStudy ablationData={currentMetricsInfo.ablation}/>}
                                    {activeLeftTab===2 && <GlobalTrend gridRaw={gridRaw} currentTime={currentTime} timeCount={data.timeCount} threshold={threshold}/>}
                                    {activeLeftTab===3 && <PersistenceMap gridRaw={gridRaw}/>}
                                    {activeLeftTab===4 && <PRCurveChart nycGrid={nycGrid} chiGrid={chiGrid} threshold={threshold} timeCount={data.timeCount}/>}
                                </div>
                            </div>

                            {/* 中央热力图 + 功能B: 时间进度条 */}
                            <div className="glass-panel p-4 flex-1 flex flex-col">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-base font-bold text-textMain flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                                        {datasetId==='nyc'?'纽约 New York City':'芝加哥 Chicago'} · 时空风险热力网格
                                    </h3>
                                    <div className="flex items-center gap-2">
                                        {showTPFP && <div className="flex items-center gap-2 text-xs bg-panelBg px-2 py-1 rounded border border-borderBorder">
                                            <span style={{color:'#22c55e'}}>✓ TP</span>
                                            <span style={{color:'#eab308'}}>! FP</span>
                                            <span style={{color:'#ef4444'}}>✗ FN</span>
                                        </div>}
                                        {!showTPFP && <div className="flex items-center gap-1 text-xs text-amber-400 bg-amber-400/10 px-2 py-1 rounded border border-amber-400/30">
                                            <div className="w-2.5 h-2.5 rounded-full border-2 border-amber-400"></div>
                                            <span>金色圆圈 = 真实碰撞</span>
                                        </div>}
                                    </div>
                                </div>
                                <SVGHeatmap gridRaw={gridRaw} currentTime={currentTime} onAreaClick={handleAreaClick} threshold={threshold} showTPFP={showTPFP}/>
                                {/* 功能B: 时间轴进度条 */}
                                <div className="mt-2 px-1">
                                    <input type="range" min="0" max={data.timeCount-1} step="1" value={currentTime}
                                        className="time-slider"
                                        style={{'--pct':`${(currentTime/(data.timeCount-1)*100).toFixed(1)}%`}}
                                        onChange={e=>{setIsPlaying(false);setCurrentTime(parseInt(e.target.value));}}
                                    />
                                    <div className="flex justify-between text-[10px] text-borderBorder mt-0.5">
                                        <span>T=0</span>
                                        <span className="text-primary font-bold">T={currentTime} — 可拖拽</span>
                                        <span>T={data.timeCount-1}</span>
                                    </div>
                                </div>
                            </div>

                            {/* 右侧面板 - 3个Tab */}
                            <div className="w-80 flex flex-col glass-panel p-4">
                                <div className="flex border-b border-borderBorder mb-3 gap-0.5">
                                    {['区域详情','混淆矩阵','风险分布'].map((t,i)=>(
                                        <button key={i}
                                            className={`flex-1 pb-2 text-xs font-bold transition-colors ${activeRightTab===i?'text-primary border-b-2 border-primary':'text-textMuted hover:text-textMain'}`}
                                            onClick={()=>setActiveRightTab(i)}>{t}</button>
                                    ))}
                                </div>
                                {activeRightTab===0 && <>
                                    <DetailPanel areaData={selectedArea} currentTime={currentTime} timeCount={data.timeCount}/>
                                    <ActiveAlerts gridRaw={gridRaw} currentTime={currentTime} threshold={threshold}/>
                                </>}
                                {activeRightTab===1 && <div className="flex-1 overflow-y-auto custom-scrollbar">
                                    <ConfusionMatrix gridRaw={gridRaw} currentTime={currentTime} threshold={threshold}/>
                                </div>}
                                {activeRightTab===2 && <div className="flex-1 flex flex-col">
                                    <RiskHistogram gridRaw={gridRaw} currentTime={currentTime} threshold={threshold}/>
                                </div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
